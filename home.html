<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Smart - Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#eef2ff,#f8fbff);}
header{
    background:linear-gradient(120deg,#4facfe,#6a11cb);
    color:white;
    padding:25px 20px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}
header h1{font-size:36px;margin-bottom:8px;}
header p{font-size:16px;}
nav{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    padding:16px;
    background:white;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
nav a, nav button{
    text-decoration:none;
    color:#333;
    font-weight:bold;
    padding:10px 18px;
    border-radius:30px;
    transition:0.3s;
    background:#f3f6ff;
    border:none;
    cursor:pointer;
    font-size:14px;
}
nav a:hover, nav button:hover{background:linear-gradient(120deg,#4facfe,#6a11cb);color:white;}
.container{width:95%;margin:30px auto;}
.title-bar{text-align:center;margin-bottom:25px;}
.title-bar h2{font-size:32px;color:#222;margin-bottom:8px;}
.title-bar p{color:#666;font-size:15px;}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}
.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 22px rgba(0,0,0,0.12);
    transition:0.35s;
    position:relative;
}
.card:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 16px 30px rgba(0,0,0,0.18);
}
.card img{
    width:100%;
    height:190px;
    object-fit:cover;
    display:block;
}
.card-body{padding:18px;text-align:center;}
.card-body h3{
    font-size:20px;
    color:#222;
    margin-bottom:10px;
    min-height:48px;
}
.card-body p{
    color:#666;
    font-size:14px;
    margin-bottom:16px;
}
.btn{
    display:inline-block;
    text-decoration:none;
    padding:11px 22px;
    border-radius:30px;
    background:linear-gradient(120deg,#4facfe,#6a11cb);
    color:white;
    font-weight:bold;
    transition:0.3s;
}
.btn:hover{opacity:0.9;transform:scale(1.05);}
.badge{
    position:absolute;
    top:12px;
    left:12px;
    background:rgba(0,0,0,0.65);
    color:white;
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
}
footer{
    margin-top:40px;
    background:#111827;
    color:white;
    text-align:center;
    padding:25px 15px;
}
@media(max-width:600px){
    header h1{font-size:28px;}
    .title-bar h2{font-size:24px;}
}
</style>
</head>
<body>

<header>
    <h1>Shop Smart</h1>
    <p id="welcomeText">Welcome User | Explore 100 amazing categories</p>
</header>

<nav>
    <a href="home.html">Home</a>
    <a href="clicks.html">My Clicks</a>

</div>

<footer>
    <p>&copy; 2026 Shop Smart | Categories Layout</p>
</footer>

<script src="script.js"></script>

  card.innerHTML = `

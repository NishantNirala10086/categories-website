<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
    body{
      font-family:Arial;
      background:linear-gradient(120deg,#4facfe,#00f2fe);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
      padding:20px;
    }
    .box{
      background:white;
      padding:30px;
      border-radius:14px;
      width:100%;
      max-width:340px;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }
    h2{text-align:center;margin-bottom:20px;}
    input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:10px;
    }
    button{
      width:100%;
      padding:12px;
      background:#4facfe;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
      margin-top:10px;
      font-size:16px;
    }
    button:hover{background:#2f8fff;}
    a{text-decoration:none;color:#4facfe;font-weight:bold;}
    p{text-align:center;margin-top:15px;}
    #loginMsg{text-align:center;margin-top:10px;font-size:14px;}
  </style>
</head>
<body>
<div class="box">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <div id="loginMsg"></div>
  <p>New user? <a href="signup.html">Signup</a></p>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Clicks</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body{background:#f4f7fb;padding:20px;}
    .top{
      text-align:center;
      margin-bottom:25px;
    }
    .top h1{color:#222;margin-bottom:10px;}
    .nav{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }
    .nav a,.nav button{
      padding:10px 18px;
      border:none;
      background:#4facfe;
      color:white;
      text-decoration:none;
      border-radius:30px;
      cursor:pointer;
    }
    .nav button{font-size:14px;}
    .list{
      max-width:900px;
      margin:auto;
      display:grid;
      gap:16px;
    }
    .item{
      background:white;
      padding:18px;
      border-radius:14px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }
    .item h3{margin-bottom:8px;color:#222;}
    .item a{color:#4facfe;text-decoration:none;font-weight:bold;}
    .empty{
      text-align:center;
      margin-top:40px;
      color:#666;
      font-size:18px;
    }
  </style>
</head>
<body>

<div class="top">
  <h1>My Clicked Categories</h1>
</div>

<div class="nav">
  <a href="home.html">Home</a>
  <button onclick="logout()">Logout</button>
</div>

<div class="list" id="clickList"></div>
<div class="empty" id="emptyMsg"></div>

<script src="script.js"></script>
<script>
checkLogin();

const clicks = JSON.parse(localStorage.getItem("clickedCategories")) || [];
const clickList = document.getElementById("clickList");
const emptyMsg = document.getElementById("emptyMsg");

if (clicks.length === 0) {
  emptyMsg.innerText = "No clicked categories yet.";
} else {
  clicks.reverse().forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <h3>${index + 1}. ${item.name}</h3>
      <p><a href="${item.link}" target="_blank">Open Product Link</a></p>
    `;
    clickList.appendChild(div);
  });
}
</script>

</body>
</html>
